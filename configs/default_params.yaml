# configs/default_params.yaml

model:
  target: "dummy"  # "random", "lingam", "proposed" などを指定すると動作するモデルが切り替わる

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  results_dir: "results/metrics"

evaluation:
  k_values: [1, 3, 5]

# 実験対象のデータセットリスト（一括実行時に参照）
datasets:
  - online_boutique
  - sock_shop
  - train_ticket